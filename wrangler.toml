# Cloudflare Pages configuration
name = "thehackney-website"
compatibility_date = "2024-09-23"

# Modern Pages config schema. With pages_build_output_dir set, Cloudflare
# Pages treats this file as the config source of truth so [vars] and
# bindings propagate to the deployed Functions runtime. Without it, Pages
# only honors the dist/ path passed to `pages deploy` and ignores [vars]
# entirely - which is what bit us with STREAM_VIDEO_UID. Migrated 2026-05-06.
pages_build_output_dir = "./dist"

# D1 binding for Phase 1 of prd-dynamic-pricing.md.
# Database created 2026-04-07 in Cloudflare dashboard on the
# jonspenn@gmail.com account. Powers anonymous date-click tracking on
# /check-your-date so we can calibrate dynamic pricing later.
[[d1_databases]]
binding = "DB"
database_name = "hackney-date-tracking"
database_id = "5ae562a1-44f6-4327-a096-b83baf0a44c8"
migrations_dir = "migrations"

# Phase 1 of prd-sys-virtual-tour.md - Cloudflare Stream video ID for the
# /virtual-tour/ page. While set to 'placeholder', the page renders a
# "Video uploading - Hugo will be back here shortly." fallback so the
# token gate, tracking, CTAs, and feedback form can all be exercised
# end-to-end before the video itself is uploaded to Stream. Swap to the
# real video UID once Hugo signs off and the file is uploaded.
[vars]
# Hugo's 5:38 walkthrough uploaded 2026-05-06 to the Hackney's Cloudflare
# Stream account (1,000 minutes / $5/mo tier). UID + customer subdomain
# captured from the dashboard. Source file:
# `sales & marketing/photos/hackney-virtual-tour-hugo-v2.mp4`. To replace
# the video later, upload a new file to Stream, copy the new UID here, push.
STREAM_VIDEO_UID = "416e61880a119b06fb8ff0001301ef9a"
STREAM_CUSTOMER_SUBDOMAIN = "customer-xt12l10jdkei4lgy"
